  repository.DailyFeeRow:
    properties:
      currency:
        type: string
      date:
        description: '"YYYY-MM-DD"'
        type: string
      total_fees:
        type: number
      trade_count:
        type: integer
    type: object
  repository.FinancialSummary:
    properties:
      pending_crypto_deposits:
        $ref: '#/definitions/repository.CountAmount'
      pending_fiat_deposits:
        $ref: '#/definitions/repository.CountAmount'
      processing_crypto_withdrawals:
        $ref: '#/definitions/repository.CountAmount'
      processing_fiat_withdrawals:
        $ref: '#/definitions/repository.CountAmount'
