      - admin
  /admin/finance/internal-transfers:
    get:
      description: 'Admin-only: paginated internal transfers between users.'
      parameters:
      - description: Page number (default 1)
        in: query
        name: page
        type: integer
      - description: Page size (default 10, max 100)
        in: query
        name: page_size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.PaginatedResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/utils.Response'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/utils.Response'
      security:
      - BearerAuth: []
      summary: List internal transfers (admin)
      tags:
      - admin
  /admin/finance/nomba-balance:
    get:
      description: 'Admin-only: fetches the current ledger and available balance from
