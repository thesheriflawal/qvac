  service.UserLimitInfo:
    properties:
      effective_limit_ngn:
        type: integer
      override_limit_ngn:
        description: null when no override
        type: integer
      remaining_ngn:
        type: integer
      tier:
        $ref: '#/definitions/models.KYCTier'
      tier_limit_ngn:
        type: integer
      today_usage_ngn:
        type: integer
    type: object
  utils.PaginatedResponse:
    properties:
      data: {}
      message:
        type: string
      pagination:
        $ref: '#/definitions/utils.PaginationMeta'
      success:
        type: boolean
    type: object
  utils.PaginationMeta:
    properties:
      page:
        type: integer
      page_size:
        type: integer
      total_items:
        type: integer
      total_pages:
        type: integer
    type: object
  utils.Response:
    properties:
      data: {}
      error: {}
      message:
        type: string
      success:
        type: boolean
    type: object
info:
  contact: {}
  description: Production-ready backend API for Kynettic platform with authentication,
    user management, and health monitoring
  title: Kynettic API
  version: "1.0"
paths:
  /admin/community-links:
    post:
      consumes:
      - application/json
      description: 'Admin-only: add or update a community link (upsert by platform).'
      parameters:
      - description: Community link
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.UpsertCommunityLinkRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/utils.Response'
            - properties:
                data:
                  $ref: '#/definitions/models.CommunityLink'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/utils.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/utils.Response'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/utils.Response'
      security:
      - BearerAuth: []
      summary: Upsert community link
      tags:
      - admin
  /admin/currencies:
    post:
      consumes:
      - application/json
      description: 'Admin-only: create or update a currency (upsert by symbol).'
      parameters:
      - description: Currency
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.CreateCurrencyRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            allOf:
            - $ref: '#/definitions/utils.Response'
            - properties:
                data:
                  $ref: '#/definitions/models.Currency'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/utils.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/utils.Response'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/utils.Response'
      security:
      - BearerAuth: []
      summary: Create/update currency
      tags:
      - admin
  /admin/finance/crypto-deposits:
    get:
      description: 'Admin-only: paginated crypto deposits, filterable by status and
        currency.'
      parameters:
      - description: Page number (default 1)
        in: query
        name: page
        type: integer
      - description: Page size (default 10, max 100)
        in: query
        name: page_size
        type: integer
      - description: 'Filter by status: pending, confirmed'
        in: query
        name: status
        type: string
      - description: Filter by currency symbol e.g. USDT
        in: query
        name: currency
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.PaginatedResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/utils.Response'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/utils.Response'
      security:
      - BearerAuth: []
      summary: List crypto deposits (admin)
      tags:
      - admin
  /admin/finance/crypto-withdrawals:
    get:
      description: 'Admin-only: paginated crypto withdrawals, filterable by status
        and currency.'
      parameters:
      - description: Page number (default 1)
        in: query
        name: page
        type: integer
      - description: Page size (default 10, max 100)
        in: query
        name: page_size
        type: integer
      - description: 'Filter by status: processing, completed, failed'
        in: query
        name: status
        type: string
      - description: Filter by currency symbol e.g. USDT
        in: query
        name: currency
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.PaginatedResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/utils.Response'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/utils.Response'
      security:
      - BearerAuth: []
      summary: List crypto withdrawals (admin)
      tags:
      - admin
  /admin/finance/fiat-deposits:
    get:
      description: 'Admin-only: paginated fiat deposits, filterable by status.'
      parameters:
      - description: Page number (default 1)
        in: query
        name: page
        type: integer
      - description: Page size (default 10, max 100)
        in: query
        name: page_size
        type: integer
      - description: 'Filter by status: pending, confirmed'
        in: query
        name: status
        type: string
      produces:
