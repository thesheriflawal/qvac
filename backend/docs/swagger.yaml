        type: boolean
      converted_balance:
        type: string
      currency:
        type: string
      default_network:
        type: string
      deposit_address:
        type: string
      destination_tag:
        type: string
      id:
        type: string
      is_crypto:
        type: boolean
      locked:
        type: string
      name:
        type: string
      reference_currency:
        type: string
      staked:
        type: string
    type: object
  repository.CountAmount:
    properties:
