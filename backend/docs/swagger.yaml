basePath: /api/v1
definitions:
  handler.AuthResponse:
    properties:
      access_token:
        type: string
      refresh_token:
        type: string
      user: {}
    type: object
  handler.BroadcastNotificationRequest:
    properties:
      message:
        type: string
      title:
        maxLength: 255
        minLength: 1
        type: string
    required:
    - message
    - title
    type: object
  handler.ChangePINRequest:
    properties:
      confirm_new_pin:
        type: string
      new_pin:
        type: string
      old_pin:
        type: string
    required:
    - confirm_new_pin
    - new_pin
    - old_pin
    type: object
  handler.ChangePasswordRequest:
    properties:
      new_password:
        description: Enforce strong password policy consistent with registration and
          reset flows.
        minLength: 12
        type: string
      old_password:
        type: string
    required:
    - new_password
    - old_password
    type: object
  handler.ConfirmEmailChangeRequest:
    properties:
      otp:
        type: string
    required:
    - otp
    type: object
  handler.CreateCurrencyRequest:
    properties:
      asset_id:
        description: Optional Blockradar asset ID for crypto withdrawals (UUID-like).
        type: string
      coingecko_id:
        description: Optional CoinGecko coin ID for price fetching (e.g., "tether",
          "ethereum").
        type: string
      decimals:
        type: integer
      is_native:
        type: boolean
      name:
        type: string
      symbol:
        type: string
    required:
    - decimals
    - name
    - symbol
    type: object
  handler.CreateNetworkRequest:
    properties:
      chain_id:
        type: integer
      chain_key:
        type: string
      is_active:
        type: boolean
      name:
        type: string
      network_type:
        enum:
        - mainnet
        - testnet
        type: string
    required:
    - chain_id
    - chain_key
    - name
    - network_type
    type: object
  handler.CreateP2PAdRequest:
    properties:
      currency_id:
        type: string
      is_private:
        type: boolean
      min_amount:
        type: string
      pin:
        description: 6-digit transaction PIN.
        type: string
      price:
        description: Required only for price_type=fixed
        type: string
      price_type:
        type: string
      relative_percent:
        description: Required only for price_type=relative
        type: string
      rollover_enabled:
        type: boolean
      total_quantity:
        type: string
      type:
        enum:
        - buy
        - sell
        type: string
    required:
    - currency_id
    - min_amount
    - pin
    - price_type
    - type
    type: object
  handler.CryptoWithdrawRequest:
    properties:
      address:
        type: string
      amount:
        type: string
      auth_code:
        description: 6-digit Google Authenticator (TOTP) code. Required only when
          2FA is enabled.
        type: string
      chain:
        type: string
      currency:
        type: string
      note:
        maxLength: 255
        type: string
      pin:
        description: 6-digit transaction PIN.
        type: string
    required:
    - address
    - amount
    - chain
    - currency
    - pin
    type: object
  handler.DeleteMyAccountRequest:
    properties:
      password:
        type: string
    required:
    - password
    type: object
  handler.DisableTwoFARequest:
    properties:
      code:
        description: 6-digit Google Authenticator (TOTP) code.
        type: string
      pin:
        description: 6-digit transaction PIN.
        type: string
    required:
    - code
    - pin
    type: object
  handler.EnableTwoFARequest:
    properties:
      code:
        type: string
    required:
    - code
    type: object
  handler.ExecuteP2PTradeRequest:
    properties:
      ad_id:
        type: string
      amount_input:
        description: The amount the user wants to trade, expressed in input_currency.
        type: string
      input_currency:
        description: '"fiat" or "crypto" — which side amount_input is denominated
          in.'
        enum:
        - fiat
        - crypto
        type: string
      pin:
        description: 6-digit transaction PIN.
        type: string
    required:
    - ad_id
    - amount_input
    - input_currency
    - pin
    type: object
  handler.FiatBankLookupRequest:
    properties:
      account_number:
        type: string
      bank_code:
        type: string
    required:
    - account_number
    - bank_code
    type: object
  handler.FiatWithdrawRequest:
    properties:
      account_name:
        type: string
      account_number:
        type: string
      amount:
        type: string
      auth_code:
        description: 6-digit Google Authenticator (TOTP) code. Required only when
          2FA is enabled.
        type: string
      bank_code:
        type: string
      bank_name:
        type: string
      narration:
        maxLength: 255
        type: string
      pin:
        description: 6-digit transaction PIN.
        type: string
    required:
    - account_name
    - account_number
    - amount
    - bank_code
    - bank_name
    - pin
    type: object
  handler.ForgotPasswordRequestOTPRequest:
    properties:
      email:
        type: string
    required:
    - email
    type: object
  handler.ForgotPasswordResetRequest:
    properties:
      new_password:
        minLength: 12
        type: string
      reset_token:
        type: string
    required:
    - new_password
    - reset_token
    type: object
  handler.ForgotPasswordVerifyOTPRequest:
    properties:
      email:
        type: string
      otp:
        type: string
    required:
    - email
    - otp
    type: object
  handler.HealthResponse:
    properties:
      database:
        type: string
      redis:
        type: string
      status:
        type: string
    type: object
  handler.InternalTransferRequest:
    properties:
      amount:
        type: string
      auth_code:
        description: 6-digit Google Authenticator (TOTP) code. Required only when
          2FA is enabled.
        type: string
      currency_id:
        type: string
      pin:
        description: 6-digit transaction PIN.
        type: string
      receiver_email:
        type: string
      receiver_uid:
        type: string
    required:
    - amount
    - currency_id
    - pin
    type: object
  handler.LoginRequest:
    properties:
      device_type:
        enum:
        - web
        - mobile
        type: string
      email:
        type: string
      password:
        type: string
    required:
    - device_type
    - email
    - password
    type: object
  handler.OpenClaimCycleRequest:
    properties:
      currency:
        description: e.g. "NGN"
        type: string
      pool_amount_fiat:
        type: number
      quarter:
        description: e.g. "2026-Q1"
        type: string
    required:
    - currency
    - pool_amount_fiat
    - quarter
    type: object
  handler.P2PAdView:
    properties:
      created_at:
        type: string
      currency:
        type: string
      effective_price:
        description: |-
          EffectivePrice is the current effective price for this ad.
          For fixed pricing, this is the same as Price.
          For relative pricing, this is the current market price adjusted by RelativePercent.
        type: string
      id:
        type: string
      is_private:
        type: boolean
      min_amount:
        description: per-order minimum
        type: number
      price:
        type: number
      price_type:
        description: fixed, relative
        type: string
      relative_percent:
        description: +/- % of market price when PriceType=relative
        type: number
      remaining_quantity:
        description: remaining capacity
        type: number
      rollover_enabled:
        type: boolean
      status:
        description: active, paused, closed
        type: string
      total_quantity:
        description: total ad capacity when rollover is off
        type: number
      type:
        description: buy or sell
        type: string
      updated_at:
        type: string
      user_id:
        type: string
      username:
        type: string
    type: object
  handler.P2POrderView:
    properties:
      ad_id:
        type: string
      amount:
        type: number
      buyer_id:
        type: string
      created_at:
        type: string
      currency:
        type: string
      escrow_wallet_id:
        type: string
      fee_amount:
        description: |-
          FeeAmount and FeeCurrency are the taker fee for this order — the fee
          charged to the party who created the order (executed against the ad).
        type: number
      fee_currency:
        type: string
      id:
        type: string
      maker_fee_amount:
        type: number
      maker_fee_currency:
        type: string
      order_number:
        description: OrderNumber is a public-facing 20-digit numeric identifier for
          the order.
        type: string
      price:
        type: number
      seller_id:
        type: string
      side:
        description: |-
          Side is from the perspective of the authenticated user: "buy" if the
          user bought crypto in this order, "sell" if they sold crypto.
        type: string
      status:
        description: pending, paid, disputed, cancelled, completed
        type: string
      taker_fee_amount:
        type: number
      taker_fee_currency:
        type: string
      total:
        type: number
      type:
        description: Type indicates whether this is a buy or sell order for crypto
          (mirrors the ad type).
        type: string
      updated_at:
        type: string
    type: object
  handler.RefreshTokenRequest:
    properties:
      refresh_token:
        type: string
    required:
    - refresh_token
    type: object
  handler.RequestEmailChangeOTPRequest:
    properties:
      new_email:
        type: string
      password:
        type: string
    required:
    - new_email
    - password
    type: object
  handler.RequestRegistrationOTPRequest:
    properties:
      email:
        type: string
    required:
    - email
    type: object
  handler.SetPasswordRequest:
    properties:
      password:
        minLength: 12
        type: string
      referral_code:
        type: string
      registration_token:
        type: string
    required:
    - password
    - registration_token
    type: object
  handler.SetUserStatusRequest:
    properties:
      is_active:
        type: boolean
    type: object
  handler.SetupPINRequest:
    properties:
      confirm_pin:
        type: string
      pin:
        type: string
    required:
    - confirm_pin
    - pin
    type: object
  handler.SocialLoginRequest:
    properties:
      device_type:
        enum:
        - web
        - mobile
        type: string
      id_token:
        type: string
      nonce:
        type: string
      referral_code:
        type: string
    required:
    - device_type
    - id_token
    - nonce
    type: object
  handler.SubmitReviewRequest:
    properties:
      content:
        minLength: 1
        type: string
      email:
        type: string
      name:
        maxLength: 255
        minLength: 2
        type: string
    required:
    - content
    - email
    - name
    type: object
  handler.SubmitTier1Request:
    properties:
      bvn:
        type: string
      date_of_birth:
        type: string
      display_username_on_p2p:
        type: boolean
      first_name:
        maxLength: 100
        minLength: 2
        type: string
      last_name:
        maxLength: 100
        minLength: 2
        type: string
      phone_number:
        maxLength: 20
        minLength: 10
        type: string
      username:
        maxLength: 50
        minLength: 3
        type: string
    required:
    - bvn
    - date_of_birth
    - first_name
    - last_name
    - phone_number
    - username
    type: object
  handler.SubmitTier2Request:
    properties:
      nin:
        type: string
    required:
    - nin
    type: object
  handler.TwoFALoginRequest:
    properties:
      code:
        type: string
      device_type:
        enum:
        - web
        - mobile
        type: string
      email:
        type: string
      password:
        type: string
    required:
    - code
    - device_type
    - email
    - password
    type: object
  handler.TwoFASetupResponse:
    properties:
      enabled:
        type: boolean
      otpauth_url:
        type: string
      secret:
        type: string
    type: object
  handler.UpdateP2PAdRequest:
    properties:
      is_private:
        type: boolean
      min_amount:
        type: string
      pin:
        description: 6-digit transaction PIN.
        type: string
      price:
        type: string
      price_type:
        type: string
      relative_percent:
        type: string
      status:
        description: active, paused, closed
        type: string
      total_quantity:
        type: string
    required:
    - pin
    type: object
  handler.UpdateProfileRequest:
    type: object
  handler.UpdateReferralConfigRequest:
    properties:
      key:
        type: string
      value:
        type: string
    required:
    - key
    - value
    type: object
  handler.UpsertCommunityLinkRequest:
    properties:
      label:
        type: string
      platform:
        type: string
      url:
        type: string
    required:
    - platform
    - url
    type: object
  handler.VerifyRegistrationOTPRequest:
    properties:
      email:
        type: string
      otp:
        type: string
    required:
    - email
    - otp
    type: object
  handler.VerifyTwoFARequest:
    properties:
      code:
        type: string
      pre_auth_token:
        type: string
    required:
    - code
    - pre_auth_token
    type: object
  handler.WalletAddressResponse:
    properties:
      address:
        type: string
      chain:
        type: string
      created:
        type: boolean
    type: object
  handler.adminSecurityView:
    properties:
      last_pin_change:
        type: string
      notifications_enabled:
        type: boolean
      pin_enabled:
        type: boolean
      twofa_enabled:
        type: boolean
    type: object
  handler.adminUserDetailResponse:
    properties:
      kyc:
        $ref: '#/definitions/models.KYCStatusResponse'
      profile:
        $ref: '#/definitions/models.UserProfile'
      recent_transactions:
        items:
          $ref: '#/definitions/models.WalletTransaction'
        type: array
      security:
        $ref: '#/definitions/handler.adminSecurityView'
      tx_total:
        type: integer
      user:
        $ref: '#/definitions/models.UserResponse'
      wallets:
        items:
          $ref: '#/definitions/models.WalletResponse'
        type: array
    type: object
  handler.setOverrideRequest:
    properties:
      limit_ngn:
        minimum: 1
        type: integer
    required:
    - limit_ngn
    type: object
  models.BankAccount:
    properties:
      account_name:
        type: string
      account_number:
        type: string
      bank_name:
        type: string
      created_at:
        type: string
      id:
        type: string
      updated_at:
        type: string
      user_id:
        type: string
    type: object
  models.CommunityLink:
    properties:
      created_at:
        type: string
      id:
        type: string
      label:
        type: string
      platform:
        type: string
      updated_at:
        type: string
      url:
        type: string
    type: object
  models.CounterpartyInfo:
    properties:
      email:
        type: string
      name:
        type: string
      uid:
        type: string
    type: object
  models.CryptoDeposit:
    properties:
      amount:
        type: number
      created_at:
        type: string
      currency:
        type: string
      id:
        type: string
      network:
        type: string
      status:
        description: pending, confirmed
        type: string
      tx_hash:
        type: string
      updated_at:
        type: string
      user_id:
        type: string
    type: object
  models.CryptoWithdrawal:
    properties:
      address:
        type: string
      amount:
        type: number
      created_at:
        type: string
      currency:
        type: string
      fee:
        type: number
      id:
        type: string
      status:
        description: processing, completed, failed
        type: string
      tx_hash:
        type: string
      updated_at:
        type: string
      user_id:
        type: string
    type: object
  models.Currency:
    properties:
      asset_id:
        description: |-
          AssetID is the Blockradar asset identifier used for withdrawals (UUID-like string).
          It is optional because not all currencies need to be withdrawable via Blockradar.
        type: string
      coingecko_id:
        description: |-
          CoinGeckoID is the CoinGecko coin identifier used for price fetching (e.g., "tether", "ethereum").
          It is optional and only needed for currencies that support relative pricing in P2P ads.
        type: string
      created_at:
        type: string
      decimals:
        type: integer
      id:
        type: string
      is_native:
        description: true for ETH
        type: boolean
      name:
        description: Ether, Tether
        type: string
      symbol:
        description: ETH, USDT
        type: string
      type:
        description: |-
          Type distinguishes fiat currencies (NGN, USD, etc.) from crypto assets.
          Values: "fiat" or "crypto". Defaults to "crypto" for backward compatibility.
          Existing fiat currency rows must be updated via a DB migration after deployment.
        type: string
      updated_at:
        type: string
    type: object
  models.FiatDeposit:
    properties:
      account_number:
        type: string
      amount:
        type: number
      bank_name:
        type: string
      created_at:
        type: string
      id:
        type: string
      reference:
        type: string
      status:
        description: pending, confirmed
        type: string
      updated_at:
        type: string
      user_id:
        type: string
    type: object
  models.FiatWithdrawal:
    properties:
      account_number:
        type: string
      amount:
        type: number
      bank_name:
        type: string
      created_at:
        type: string
      fee:
        type: number
      id:
        type: string
      stamp_duty:
        type: number
      status:
        description: processing, completed, failed
        type: string
      total_fee:
        type: number
      updated_at:
        type: string
      user_id:
        type: string
    type: object
  models.InternalTransfer:
    properties:
      amount:
        type: number
      created_at:
        type: string
      currency:
        type: string
      id:
        type: string
      receiver_id:
        type: string
      sender_id:
        type: string
      status:
        type: string
      updated_at:
        type: string
    type: object
  models.KYCStatus:
    enum:
    - pending
    - verified
    - rejected
    type: string
    x-enum-varnames:
    - KYCStatusPending
    - KYCStatusVerified
    - KYCStatusRejected
  models.KYCStatusResponse:
    properties:
      address_verified:
        type: boolean
      bvn_verified:
        type: boolean
      next_tier:
        $ref: '#/definitions/models.KYCTier'
      nin_verified:
        type: boolean
      rejection_reason:
        type: string
      selfie_verified:
        type: boolean
      status:
        $ref: '#/definitions/models.KYCStatus'
      tier:
        $ref: '#/definitions/models.KYCTier'
    type: object
  models.KYCTier:
    enum:
    - 0
    - 1
    - 2
    - 3
    type: integer
    x-enum-varnames:
    - KYCTierNone
    - KYCTier1
    - KYCTier2
    - KYCTier3
  models.Network:
    properties:
      chain_id:
        type: integer
      chain_key:
        type: string
      created_at:
        type: string
      id:
        type: string
      is_active:
        type: boolean
      name:
        type: string
      network_type:
        description: mainnet | testnet
        type: string
      updated_at:
        type: string
    type: object
  models.NotificationResponse:
    properties:
      created_at:
        type: string
      id:
        type: string
      is_read:
        type: boolean
      message:
        type: string
      read_at:
        type: string
      title:
        type: string
    type: object
  models.P2PAd:
    properties:
      created_at:
        type: string
      currency:
        type: string
      id:
        type: string
      is_private:
        type: boolean
      min_amount:
        description: per-order minimum
        type: number
      price:
        type: number
      price_type:
        description: fixed, relative
        type: string
      relative_percent:
        description: +/- % of market price when PriceType=relative
        type: number
      remaining_quantity:
        description: remaining capacity
        type: number
      rollover_enabled:
        type: boolean
      status:
        description: active, paused, closed
        type: string
      total_quantity:
        description: total ad capacity when rollover is off
        type: number
      type:
        description: buy or sell
        type: string
      updated_at:
        type: string
      user_id:
        type: string
      username:
        type: string
    type: object
  models.PlatformFeeBalance:
    properties:
      created_at:
        type: string
      currency:
        type: string
      id:
        type: string
      total_amount:
        type: number
      total_count:
        type: integer
      updated_at:
        type: string
    type: object
  models.ReviewResponse:
    properties:
      content:
        type: string
      created_at:
        type: string
      email:
        type: string
      id:
        type: string
      name:
        type: string
    type: object
  models.TransactionHistoryItem:
    properties:
      amount:
        type: number
      balance_after:
        type: number
      balance_before:
        type: number
      counterparty:
        allOf:
        - $ref: '#/definitions/models.CounterpartyInfo'
        description: Counterparty (sender or receiver, if applicable).
      created_at:
        type: string
      currency:
        type: string
      description:
        type: string
      fee:
        type: number
      id:
        type: string
      method:
        description: '"bank_transfer", "internal_transfer", "onchain", "p2p_trade",
          "referral_reward"'
        type: string
      receipt:
        allOf:
        - $ref: '#/definitions/models.TransactionReceipt'
        description: |-
          Receipt holds type-specific details (bank info for fiat, chain info for
          crypto). It is always present so the client can access receipt fields
          without checking a separate level.
      status:
        type: string
      type:
        type: string
    type: object
  models.TransactionReceipt:
    properties:
      account_number:
        type: string
      address:
        description: Crypto-specific fields.
        type: string
      bank_name:
        description: Fiat-specific fields.
        type: string
      network:
        type: string
      tx_hash:
        type: string
    type: object
  models.UserProfile:
    properties:
      avatar_url:
        type: string
      country:
        type: string
      created_at:
        type: string
      date_of_birth:
        type: string
      display_username_on_p2p:
        type: boolean
      first_name:
        description: KYC-related profile fields
        type: string
      full_name:
        type: string
      id:
        type: string
      last_name:
        type: string
      middle_name:
        type: string
      phone_number:
        type: string
      updated_at:
        type: string
      user_id:
        type: string
      username:
        type: string
    type: object
  models.UserResponse:
    properties:
      created_at:
        type: string
      email:
        type: string
      first_name:
        type: string
      id:
        type: string
      is_2fa_enabled:
        type: boolean
      is_active:
        type: boolean
      is_pin_enabled:
        type: boolean
      last_name:
        type: string
      referral_code:
        type: string
      role:
        $ref: '#/definitions/models.UserRole'
      uid:
        type: string
      updated_at:
        type: string
      username:
        type: string
    type: object
  models.UserRole:
    enum:
    - user
    - admin
    type: string
    x-enum-varnames:
    - RoleUser
    - RoleAdmin
  models.WalletResponse:
    properties:
      balance:
        type: number
      created_at:
        type: string
      currency:
        type: string
      currency_id:
        type: string
      id:
        type: string
      locked_balance:
        type: number
      updated_at:
        type: string
      user_id:
        type: string
    type: object
