        type: number
    type: object
  repository.WalletBalanceSummary:
    properties:
      currency:
        type: string
      total_balance:
        type: number
      wallet_count:
        type: integer
    type: object
  repository.WalletDiscrepancy:
    properties:
      currency:
        type: string
      discrepancy:
        description: stored - tx_net
        type: number
      stored_balance:
        description: from wallets.balance (converted)
        type: number
      tx_count:
        type: integer
      tx_net_balance:
        description: SUM(balance_after - balance_before)
        type: number
      user_email:
        type: string
      user_id:
        type: string
      wallet_id:
        type: string
    type: object
  repository.WalletVerificationResult:
    properties:
      discrepancies:
        items:
          $ref: '#/definitions/repository.WalletDiscrepancy'
        type: array
      discrepancy_count:
        type: integer
      total_wallets:
        type: integer
    type: object
  service.AdminOrderParty:
    properties:
      email:
        type: string
      id:
        type: string
      uid:
        type: string
      username:
        type: string
    type: object
  service.AdminP2POrderResponse:
    properties:
      ad_id:
        type: string
      amount:
        type: number
      buyer:
        $ref: '#/definitions/service.AdminOrderParty'
      buyer_id:
        type: string
      created_at:
        type: string
      currency:
        type: string
      escrow_wallet_id:
        type: string
      id:
        type: string
      maker_fee_amount:
        type: number
      maker_fee_currency:
        type: string
      order_number:
        description: OrderNumber is a public-facing 20-digit numeric identifier for
          the order.
        type: string
      price:
        type: number
      seller:
        $ref: '#/definitions/service.AdminOrderParty'
      seller_id:
        type: string
      status:
        description: pending, paid, disputed, cancelled, completed
        type: string
      taker_fee_amount:
        type: number
      taker_fee_currency:
        type: string
      total:
        type: number
      type:
        description: Type indicates whether this is a buy or sell order for crypto
          (mirrors the ad type).
        type: string
      updated_at:
        type: string
    type: object
  service.ReferralInfo:
    properties:
      current_quarter:
        type: string
      eligible:
        type: boolean
      quarter_trade_count:
        type: integer
      referral_code:
        type: string
      required_trade_count:
        type: integer
      total_points:
        type: number
      total_referrals:
        type: integer
    type: object
  service.RevenueSummary:
    properties:
      fee_balances:
        items:
          $ref: '#/definitions/models.PlatformFeeBalance'
