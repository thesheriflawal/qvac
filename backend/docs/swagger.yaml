                  $ref: '#/definitions/nomba.AccountBalanceData'
              type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/utils.Response'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/utils.Response'
        "502":
          description: Bad Gateway
          schema:
            $ref: '#/definitions/utils.Response'
      security:
      - BearerAuth: []
      summary: Get Nomba account balance (admin)
      tags:
      - admin
  /admin/finance/quidax-balances:
    get:
      description: 'Admin-only: fetches all Quidax master-account wallets and returns
        only those with a non-zero balance.'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/utils.Response'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/quidax.MeWallet'
                  type: array
              type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/utils.Response'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/utils.Response'
        "502":
          description: Bad Gateway
          schema:
            $ref: '#/definitions/utils.Response'
      security:
      - BearerAuth: []
      summary: Get Quidax wallets with balance (admin)
      tags:
      - admin
  /admin/finance/summary:
    get:
      description: 'Admin-only: total wallet balances per currency and pending deposit/withdrawal
        counts.'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/utils.Response'
            - properties:
                data:
                  $ref: '#/definitions/repository.FinancialSummary'
              type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/utils.Response'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/utils.Response'
      security:
      - BearerAuth: []
      summary: Financial summary (admin)
      tags:
      - admin
  /admin/finance/verify-balances:
    get:
      description: 'Admin-only: compares wallets.balance against SUM(balance_after
        - balance_before) from wallet_transactions. Returns only wallets with discrepancies.
        This is an expensive query — use sparingly.'
      parameters:
      - description: 'Filter by currency symbol e.g. USDT (default: all currencies)'
        in: query
        name: currency
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/utils.Response'
            - properties:
                data:
                  $ref: '#/definitions/repository.WalletVerificationResult'
              type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/utils.Response'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/utils.Response'
      security:
      - BearerAuth: []
      summary: Verify wallet balances (admin)
      tags:
      - admin
  /admin/kyc:
    get:
      description: 'Admin-only: paginated KYC queue with optional filters by status
        and tier.'
      parameters:
      - description: Page number (default 1)
        in: query
        name: page
        type: integer
      - description: Page size (default 10, max 100)
        in: query
        name: page_size
        type: integer
      - description: 'Filter by status: pending, verified, rejected'
        in: query
        name: status
        type: string
      - description: 'Filter by tier: 0, 1, 2, 3'
        in: query
        name: tier
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.PaginatedResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/utils.Response'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/utils.Response'
      security:
      - BearerAuth: []
      summary: List KYC verifications (admin)
      tags:
      - admin
  /admin/kyc/{user_id}:
    get:
      description: 'Admin-only: full KYC record for a user including address, selfie
        confidence, liveness score.'
      parameters:
      - description: User UUID
        in: path
        name: user_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/utils.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/utils.Response'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/utils.Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/utils.Response'
      security:
      - BearerAuth: []
      summary: Get KYC verification detail (admin)
      tags:
      - admin
  /admin/networks:
    post:
      consumes:
      - application/json
      description: 'Admin-only: create or update a network (upsert by chain_key +
        network_type).'
      parameters:
      - description: Network
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.CreateNetworkRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            allOf:
            - $ref: '#/definitions/utils.Response'
            - properties:
                data:
                  $ref: '#/definitions/models.Network'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/utils.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/utils.Response'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/utils.Response'
      security:
      - BearerAuth: []
      summary: Create/update network
      tags:
      - admin
  /admin/notifications/broadcast:
    post:
      consumes:
      - application/json
      description: Create a notification for every user in the system (admin only)
      parameters:
      - description: Broadcast notification details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.BroadcastNotificationRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Notification broadcasted successfully
          schema:
            $ref: '#/definitions/utils.Response'
        "400":
          description: Validation error
          schema:
            $ref: '#/definitions/utils.Response'
        "401":
          description: Authentication required
          schema:
            $ref: '#/definitions/utils.Response'
        "403":
          description: Admin access required
          schema:
            $ref: '#/definitions/utils.Response'
        "500":
          description: Failed to broadcast notification
          schema:
            $ref: '#/definitions/utils.Response'
      security:
      - BearerAuth: []
      summary: Broadcast notification to all users
      tags:
      - admin
  /admin/p2p/orders:
    get:
      description: 'Admin-only: paginated list of all P2P orders, filterable by status,
        currency, user, and date range.'
      parameters:
      - description: Page number (default 1)
        in: query
        name: page
        type: integer
      - description: Page size (default 10, max 100)
        in: query
        name: page_size
        type: integer
      - description: 'Order status: pending, paid, disputed, cancelled, completed'
        in: query
        name: status
        type: string
      - description: Crypto currency symbol (e.g. USDT)
        in: query
        name: currency
        type: string
      - description: Filter orders where user is buyer or seller (UUID)
        in: query
        name: user_id
        type: string
      - description: Start date filter (RFC3339, e.g. 2026-01-01T00:00:00Z)
        in: query
        name: from
        type: string
      - description: End date filter (RFC3339, e.g. 2026-12-31T23:59:59Z)
        in: query
        name: to
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Orders retrieved successfully
          schema:
            allOf:
            - $ref: '#/definitions/utils.PaginatedResponse'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/service.AdminP2POrderResponse'
                  type: array
              type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/utils.Response'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/utils.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/utils.Response'
      security:
      - BearerAuth: []
      summary: List all P2P orders (admin)
      tags:
      - admin
  /admin/p2p/top-traders:
    get:
      description: 'Admin-only: paginated list of users ranked by number of completed
        P2P trades, with total volume.'
      parameters:
      - description: Page number (default 1)
        in: query
        name: page
        type: integer
      - description: Page size (default 20, max 100)
        in: query
        name: page_size
        type: integer
      - description: Filter by crypto symbol (e.g. USDT)
        in: query
        name: currency
